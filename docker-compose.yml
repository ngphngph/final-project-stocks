version: '3.8'

services:
  # ── PostgreSQL 數據庫 ──────────────────
  postgres:
    image: postgres:15
    container_name: postgres-container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: bootcamp_stockwatch
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - bootcamp-network
    ports:
      - "5532:5432"                       # 本地 5532 → 容器 5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata

  # ── Redis 快取 ──────────────────────────
  redis:
    image: redis:7
    container_name: redis-container
    networks:
      - bootcamp-network
    ports:
      - "6479:6379"                       # 本地 6479 → 容器 6379
    volumes:
      - ./redis_data:/data

  # ── Spring Boot App 1：data-provider ──
