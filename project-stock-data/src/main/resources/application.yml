server:
  port: ${PORT:8102}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5532/bootcamp_stockwatch}    # 本機用 docker-compose；雲端用 Supabase 連線字串
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update      # 自動建表（開發用）
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6479}
      password: ${REDIS_PASSWORD:}    # 本機 Redis 沒密碼就留空；Railway Redis 會給密碼

data-provider:
  base-url: ${DATA_PROVIDER_BASE_URL:http://localhost:8101}   # 本機 localhost；雲端用 Railway 內部網址