server:
  port: 8102

spring:
  datasource:
    url: jdbc:postgresql://localhost:5532/bootcamp_xxxx    # port 5532 對應 docker-compose
    username: postgres
    password: admin1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update      # 自動建表（開發用）
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6479             # port 6479 對應 docker-compose

data-provider:
  base-url: http://localhost:8101   # data-provider-app 的地址